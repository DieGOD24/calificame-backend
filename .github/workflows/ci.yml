name: Backend CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "sqlite:///./test.db"
  SECRET_KEY: "ci-test-secret-key-not-for-production"
  OPENAI_API_KEY: "sk-test-not-real"
  STORAGE_TYPE: "local"
  STORAGE_LOCAL_PATH: "./test_uploads"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-3.13-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check --fix and format
        run: |
          ruff check app/ tests/ --fix --quiet
          ruff format app/ tests/

      - name: Auto-commit if needed
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "Files auto-formatted by ruff:"
            git diff --name-only
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format with ruff"
            git push
            echo "::notice::Auto-formatted and pushed."
          else
            echo "All files properly formatted."
          fi

  type-check:
    name: "Type Check (mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('requirements-dev.txt') }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary || true

  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Create upload directory
        run: mkdir -p ./test_uploads

      - name: Run unit tests with coverage
        run: pytest tests/ --ignore=tests/e2e -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=40

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short

      - name: Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  security:
    name: "Security Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project deps
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc || true

      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" app/ tests/ || echo "WARNING: Possible API key found"

  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t calificame-backend:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-backend \
            -e DATABASE_URL=sqlite:///./test.db \
            -e SECRET_KEY=docker-test-key \
            -e OPENAI_API_KEY=sk-test \
            -p 8000:8000 \
            calificame-backend:test
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-backend && exit 1)
          docker stop test-backend
