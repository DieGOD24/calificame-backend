# =============================================================================
# Calificame Backend — Standalone Docker Compose
# Usage: cd backend && docker compose up -d
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://calificame:calificame_dev@db:5432/calificame
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/uploads
      CORS_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: INFO
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: calificame
      POSTGRES_PASSWORD: calificame_dev
      POSTGRES_DB: calificame
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calificame -d calificame"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:
